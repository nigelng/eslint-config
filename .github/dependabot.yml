version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: prettier
        update-types:
          - version-update:semver-major
